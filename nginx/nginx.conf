events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript;

    server_tokens off;

    # Redirect all HTTP to HTTPS (non-www)
    server {
        listen 80;
        server_name howmanyareplaying.com www.howmanyareplaying.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://howmanyareplaying.com$request_uri;
        }
    }

    # Redirect www HTTPS → non-www HTTPS
    server {
        listen 443 ssl;
        server_name www.howmanyareplaying.com;

        ssl_certificate     /etc/letsencrypt/live/howmanyareplaying.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/howmanyareplaying.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        return 301 https://howmanyareplaying.com$request_uri;
    }

    # HTTPS main server
    server {
        listen 443 ssl;
        server_name howmanyareplaying.com;

        ssl_certificate     /etc/letsencrypt/live/howmanyareplaying.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/howmanyareplaying.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Serve proper robots.txt instead of SPA fallback
        location = /robots.txt {
            default_type text/plain;
            return 200 "User-agent: *\nAllow: /\n\nSitemap: https://howmanyareplaying.com/sitemap.xml\n";
        }

        # API proxy → backend
        location /api/ {
            proxy_pass         http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://backend:3001;
        }

        # Sitemap — served by backend
        location = /sitemap.xml {
            proxy_pass         http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Static assets with long-lived cache
        location /assets/ {
            proxy_pass         http://frontend:80;
            proxy_set_header   Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # SPA static files
        location / {
            proxy_pass         http://frontend:80;
            proxy_set_header   Host $host;
        }
    }
}
